<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بكِ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* اسم الصورة الخلفية: background.jpg */
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            color: white;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.6); /* خلفية سوداء شفافة عشان الكلام يظهر */
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 300px;
        }

        h2 { margin-bottom: 20px; }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            text-align: center;
        }

        button {
            padding: 10px 25px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #ff758f; }

        #error-msg {
            color: #ffb3b3;
            margin-top: 15px;
            font-size: 14px;
            display: none; /* مخفي في البداية */
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>الباسورد ايه ياقلبي؟</h2>
        <input type="password" id="passwordInput" placeholder="اكتبي الباسورد هنا...">
        <br>
        <button onclick="checkPassword()">دخول</button>
        <p id="error-msg">لا غلط ركزي</p>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('passwordInput').value;
            const error = document.getElementById('error-msg');
            
            // الباسورد المطلوب
            if (pass === "17/11/2025") {
                window.location.href = "hj.html"; // التحويل لصفحة hj
            } else {
                error.style.display = "block"; // إظهار رسالة الخطأ
            }
        }
    </script>

</body>
</html>
